<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ndrop</title>
    <link rel="icon" href="/favicon.ico" sizes="32x32">
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <svg class="sprite" aria-hidden="true">
      <symbol id="icon-box" viewBox="0 0 24 24">
        <path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"></path>
        <path d="m3.3 7 8.7 5 8.7-5"></path>
        <path d="M12 22V12"></path>
      </symbol>
      <symbol id="icon-lock" viewBox="0 0 24 24">
        <rect width="18" height="11" x="3" y="11" rx="2"></rect>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
      </symbol>
      <symbol id="icon-check" viewBox="0 0 24 24">
        <path d="M20 6 9 17l-5-5"></path>
      </symbol>
      <symbol id="icon-eye" viewBox="0 0 24 24">
        <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7S2 12 2 12Z"></path>
        <circle cx="12" cy="12" r="3"></circle>
      </symbol>
      <symbol id="icon-eye-off" viewBox="0 0 24 24">
        <path d="m2 2 20 20"></path>
        <path d="M10.6 10.6A3 3 0 0 0 12 15a3 3 0 0 0 2.4-1.2"></path>
        <path d="M7.1 7.1C3.8 9 2 12 2 12s3.5 7 10 7c1.8 0 3.4-.5 4.8-1.2"></path>
        <path d="M19.1 15.1C21 13.5 22 12 22 12s-3.5-7-10-7c-.8 0-1.6.1-2.3.3"></path>
      </symbol>
      <symbol id="icon-download" viewBox="0 0 24 24">
        <path d="M12 3v12"></path>
        <path d="m7 10 5 5 5-5"></path>
        <path d="M5 21h14"></path>
      </symbol>
      <symbol id="icon-upload" viewBox="0 0 24 24">
        <path d="M12 21V9"></path>
        <path d="m17 14-5-5-5 5"></path>
        <path d="M5 3h14"></path>
      </symbol>
      <symbol id="icon-copy" viewBox="0 0 24 24">
        <rect width="14" height="14" x="8" y="8" rx="2"></rect>
        <path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"></path>
      </symbol>
      <symbol id="icon-file" viewBox="0 0 24 24">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8Z"></path>
        <path d="M14 2v6h6"></path>
      </symbol>
      <symbol id="icon-text" viewBox="0 0 24 24">
        <path d="M4 7V5h16v2"></path>
        <path d="M9 20h6"></path>
        <path d="M12 5v15"></path>
      </symbol>
    </svg>

    <main class="app">
      <section class="panel">
        <div class="header">
          <div class="brand">
            <span class="brand-mark"><svg class="icon"><use href="#icon-box"></use></svg></span>
            <div>
              <h1>ndrop</h1>
              <p>Encrypted text, file, and folder transfer</p>
            </div>
          </div>
          <span id="status-pill" class="pill">
            <svg class="icon"><use href="#icon-lock"></use></svg>
            <span>Locked</span>
          </span>
        </div>

        <form id="auth-form" class="auth">
          <div class="section-title">
            <svg class="icon"><use href="#icon-lock"></use></svg>
            <label for="api-key">API key</label>
          </div>
          <div class="input-row">
            <input id="api-key" type="password" autocomplete="current-password" placeholder="Enter API key" required>
            <button id="toggle-key" class="icon-button" type="button" aria-label="Show API key" title="Show API key">
              <svg class="icon"><use href="#icon-eye"></use></svg>
              <span>Show</span>
            </button>
          </div>
          <label class="check-row">
            <input id="remember-key" type="checkbox">
            <span>Remember on this device</span>
          </label>
        </form>

        <nav class="tabs" aria-label="Transfer mode">
          <button id="pull-tab" class="tab active" type="button">
            <svg class="icon"><use href="#icon-download"></use></svg>
            <span>Pull</span>
          </button>
          <button id="push-tab" class="tab" type="button">
            <svg class="icon"><use href="#icon-upload"></use></svg>
            <span>Push</span>
          </button>
        </nav>

        <section id="pull-view" class="view active" aria-labelledby="pull-tab">
          <div class="actions">
            <button id="pull-button" class="primary" type="button">
              <svg class="icon"><use href="#icon-download"></use></svg>
              <span>Pull latest</span>
            </button>
            <button id="copy-button" type="button" disabled>
              <svg class="icon"><use href="#icon-copy"></use></svg>
              <span>Copy text</span>
            </button>
            <button id="download-button" type="button" disabled>
              <svg class="icon"><use href="#icon-file"></use></svg>
              <span>Download</span>
            </button>
          </div>
          <div id="pull-meta" class="meta">No content loaded.</div>
          <textarea id="pull-text" class="text-output" readonly placeholder="Pulled text will appear here."></textarea>
        </section>

        <section id="push-view" class="view" aria-labelledby="push-tab">
          <div class="field">
            <div class="section-title">
              <svg class="icon"><use href="#icon-text"></use></svg>
              <label for="push-text">Text</label>
            </div>
            <textarea id="push-text" placeholder="Type text to push"></textarea>
            <button id="push-text-button" class="primary" type="button">
              <svg class="icon"><use href="#icon-upload"></use></svg>
              <span>Push text</span>
            </button>
          </div>

          <div class="divider"></div>

          <div class="field">
            <div class="section-title">
              <svg class="icon"><use href="#icon-file"></use></svg>
              <label for="push-file">File</label>
            </div>
            <input id="push-file" type="file">
            <button id="push-file-button" class="primary" type="button">
              <svg class="icon"><use href="#icon-upload"></use></svg>
              <span>Push file</span>
            </button>
          </div>
        </section>

        <div id="message" class="message" role="status" aria-live="polite"></div>
      </section>
    </main>
    <script src="/app.js"></script>
  </body>
</html>
